<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UserFlow — Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              display: ["Syne", "sans-serif"],
              body: ["DM Sans", "sans-serif"],
            },
            colors: {
              navy: {
                950: "#04080f",
                900: "#080c14",
                800: "#0d1421",
                700: "#111827",
                600: "#161f30",
                500: "#1e2d45",
              },
            },
            keyframes: {
              fadeIn: { from: { opacity: 0 }, to: { opacity: 1 } },
              slideUp: {
                from: { opacity: 0, transform: "translateY(16px)" },
                to: { opacity: 1, transform: "translateY(0)" },
              },
            },
            animation: {
              fadeIn: "fadeIn 0.3s ease",
              slideUp: "slideUp 0.3s ease",
            },
            boxShadow: {
              glow: "0 0 40px rgba(56,189,248,0.12)",
            },
          },
        },
      };
    </script>
    <style>
      * {
        box-sizing: border-box;
      }
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: #0d1421;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(56, 189, 248, 0.25);
        border-radius: 99px;
      }
      .nav-active {
        background: rgba(56, 189, 248, 0.1) !important;
        color: #38bdf8 !important;
        border-color: rgba(56, 189, 248, 0.2) !important;
      }
      input:-webkit-autofill {
        -webkit-box-shadow: 0 0 0px 1000px #0d1421 inset !important;
        -webkit-text-fill-color: #f0f4f8 !important;
      }
    </style>
  </head>
  <body class="bg-[#080c14] text-slate-100 antialiased font-body">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
